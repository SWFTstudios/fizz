name: Deploy Shopify theme

# On every merge/push to main, push fizz-july-14th-theme to the live store theme.
on:
  push:
    branches: [main]
    paths:
      - "fizz-july-14th-theme/**"
      - ".github/workflows/deploy-theme.yml"
  workflow_dispatch:

concurrency:
  group: deploy-theme-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Push July 14th theme
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Push theme to Shopify
        env:
          SHOPIFY_STORE: ${{ vars.SHOPIFY_STORE }}
          SHOPIFY_THEME_ID: ${{ vars.SHOPIFY_THEME_ID }}
          # Theme Access password (shptka_...) — Shopify Theme Access app
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_FORCE: "1"
        run: |
          set -euo pipefail
          if [ -z "${SHOPIFY_CLI_THEME_TOKEN:-}" ]; then
            echo "::error::Missing secret SHOPIFY_CLI_THEME_TOKEN (Shopify Theme Access password)."
            exit 1
          fi
          STORE="${SHOPIFY_STORE:-g9rykd-jt.myshopify.com}"
          THEME_ID="${SHOPIFY_THEME_ID:-188630794525}"
          echo "Pushing fizz-july-14th-theme → store=${STORE} theme=${THEME_ID}"
          shopify theme push \
            --path fizz-july-14th-theme \
            --store "$STORE" \
            --theme "$THEME_ID" \
            --allow-live \
            --nodelete \
            --json
